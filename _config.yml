# genmurk — a Bussetech Software Studio project site.
#
# Created from <org>/project-template by the studio factory (EPIC1-08).
# Double-underscore placeholders are filled by scripts/new-project.sh in
# the platform repo; if you can still see any, the fill step didn't run.
#
# Theme: pinned tag, never a branch (theme docs/versioning.md). Bump
# canary-first when a new theme version ships.
title: genmurk
description: "GenMURK — a modern multiplayer text world (MUD/MUSE): a clean-room rebuild inspired by the TinyMUSE engine and the early-1990s MIT MicroMUSE instance (historical reference, not adopted). Build-in-public living docs here; the app lives at genmurk.com."
lang: en
url: "https://genmurk.bussetech.com"
baseurl: ""

remote_theme: bussetech/theme@v0.11.0
plugins:
  - jekyll-remote-theme

studio:
  logotype: "bussetech | software studio"
  org: bussetech
  domain: bussetech.com
  # public | private | private-published — must match this repo's entry in
  # the control repo's platform.yml. The theme keys its leak rule off it.
  visibility: public
  # Studio legal identity (EPIC2-01) — the footer copyright line. Filled by
  # the factory from the control repo's platform.yml branding.legal.copyright.
  legal:
    copyright: "© 2026 Eszett, LLC"
  # Cloudflare Web Analytics token, minted per live hostname by the DNS
  # steward into platform.yml (EPIC1-04). Backfill from there; not secret.
  analytics_beacon: ""
  # Site-wide email capture (theme signup rail, v0.11.0). rail:true renders the
  # block on every page (home + all page-layout pages); it POSTs to the studio's
  # Buttondown provider — the provider holds the PII, the repo holds no secret
  # (ADR-0034). Build-in-public: honest, no-JS, no-pixel, double opt-in.
  # Build-in-public sites link their repo in the footer + menu (STEERCO).
  footer_note: 'Built in public — <a href="https://github.com/bussetech/genmurk">source on GitHub</a>.'
  signup:
    enabled: true
    rail: true
    rail_placement: "genmurk-rail"
    action: "https://buttondown.com/api/emails/embed-subscribe/bussetech"
    email_field: email
    heading: "GenMURK + Studio updates"
    value_prop: "Get a note when the GenMURK build moves — decomposition, decisions, progress — plus the occasional update on what the studio ships. One studio list, no spam, no tracking."
    button_label: "Subscribe"
    privacy_note: "We store only your email, to send these updates, under the Eszett, LLC privacy notice. Double opt-in; unsubscribe any time."
    hidden:
      embed: "1"
    placement_field: "metadata__placement"
  nav:
    - title: Home
      url: /
    - title: Decomposition
      url: /decomposition/
    - title: Backlog
      url: /backlog/
    - title: Decisions
      url: /decisions/
    - title: Compatibility
      url: /compatibility/
    - title: Museum
      url: /museum/
    - title: Source
      url: https://github.com/bussetech/genmurk

markdown: kramdown
sass:
  style: compressed
  # Never emit source maps: for private-published sites a .map file is a
  # source leak (ADR-0006) and shared site CI fails on it; for public sites
  # it is dead weight. First proven live by test-factory's CI (EPIC1-08).
  sourcemap: never

# data/ and schema/ are deliberately NOT excluded: the published site serves
# the datasets and their schemas verbatim (research outputs are the point —
# and for private-published repos they are the shareable part).
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - CLAUDE.md
  - README.md
  - LICENSE
  - gnomes/
  - docs/
  # app/ is the GenMURK application (GENMURK-EPIC1, app-home ruling
  # platform#317): built in this repo, never part of the docs site. The
  # two-surfaces law is about deploy targets — the app never deploys to
  # these Pages, and the Jekyll build excludes it entirely.
  - app/
